name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Install dossier tools
        working-directory: scripts
        run: pnpm install --frozen-lockfile

      - name: Check dossier tools
        working-directory: scripts
        run: pnpm check

      - name: Install dossier engine
        working-directory: assets/dossier-engine
        run: pnpm install --frozen-lockfile

      - name: Check dossier engine
        working-directory: assets/dossier-engine
        run: pnpm check
